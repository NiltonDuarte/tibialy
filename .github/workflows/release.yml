name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: Tibialy-${{ github.ref_name }}-macOS.zip
            debug_artifact_name: Tibialy-Debug-${{ github.ref_name }}-macOS.zip
          - os: windows-latest
            artifact_name: Tibialy-${{ github.ref_name }}-Windows.zip
            debug_artifact_name: Tibialy-Debug-${{ github.ref_name }}-Windows.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build Standard Application
        run: uv run python build.py

      - name: Build Debug Application
        run: uv run python build.py --debug

      - name: Archive macOS Apps
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -ry ../${{ matrix.artifact_name }} Tibialy.app
          zip -ry ../${{ matrix.debug_artifact_name }} Tibialy_Debug.app

      - name: Archive Windows Apps
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist\Tibialy.exe -DestinationPath ${{ matrix.artifact_name }}
          Compress-Archive -Path dist\Tibialy_Debug.exe -DestinationPath ${{ matrix.debug_artifact_name }}

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ matrix.debug_artifact_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'rc') }}
