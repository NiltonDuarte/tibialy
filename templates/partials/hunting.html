<div id="page-hunting" class="hidden animate-fade-in">
    <div class="max-w-7xl mx-auto mb-8 bg-theme-bg-panel p-6 rounded-lg border border-theme-border-base shadow-lg">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-theme-border-light pb-4">
            <div>
                <h2 class="text-xl font-bold text-theme-accent-text flex items-center gap-2">
                    📋 Pre-Hunt Checklist
                </h2>
                <p class="text-xs text-theme-text-dim mt-1">Ensure you are fully prepared before heading to the spawn.</p>
            </div>
            <button onclick="uncheckAllList()" class="px-4 py-2 bg-theme-bg-input hover:bg-theme-border-dark text-theme-text-white font-bold rounded text-sm transition border border-theme-border-light shadow-sm shrink-0">
                🔄 Uncheck All
            </button>
        </div>

        <div id="checklistContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
            </div>

        <div class="flex flex-col md:flex-row gap-3 pt-4 border-t border-theme-border-light/50">
            <div class="flex flex-grow gap-2">
                <input type="text" id="newCheckItem" placeholder="Add a custom checklist item..." class="w-full p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white text-sm focus:outline-none focus:border-theme-accent-focus">
                <button onclick="addChecklistItem()" class="px-4 py-2 bg-theme-accent-bg hover:bg-theme-accent-hover text-white font-bold rounded text-sm transition shadow shrink-0">
                    ➕ Add
                </button>
            </div>

            <div class="shrink-0 flex items-center gap-2">
                <select id="restoreDefaultSelect" onchange="restoreDefaultCheck(this.value)" class="p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-dim focus:outline-none focus:border-theme-accent-focus text-sm cursor-pointer disabled:opacity-50">
                    <option value="" disabled selected>Restore default checks...</option>
                    </select>
            </div>
        </div>
    </div>
    <div class="flex flex-col lg:flex-row gap-8 max-w-7xl mx-auto">

        <div class="lg:w-1/3 space-y-6">
            <div class="bg-theme-bg-panel p-6 rounded-lg border border-theme-border-base shadow-lg">
                <h2 class="text-xl font-bold text-theme-accent-text mb-4 flex items-center gap-2">
                    🗺️ Hunting Database
                </h2>

                <select id="huntingSelector" onchange="renderHuntingGround()"
                    class="w-full p-2.5 mb-4 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:outline-none focus:border-theme-accent-focus cursor-pointer font-semibold shadow-sm">
                </select>

                <div class="grid grid-cols-2 gap-2 mb-6">
                    <div class="flex gap-2">
                        <button onclick="openEditor(false)"
                            class="w-full p-2 bg-theme-bg-input hover:bg-theme-border-dark text-theme-text-white font-bold rounded text-sm transition border border-theme-border-light"
                            title="Edit Selected">
                            ✏️ Edit
                        </button>
                        <button onclick="openEditor(true)"
                            class="w-full p-2 bg-theme-accent-bg hover:bg-theme-accent-hover text-theme-text-white font-bold rounded text-sm transition shadow"
                            title="Create New">
                            ➕ New
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportHuntingData()"
                            class="w-full p-2 bg-theme-bg-input hover:bg-theme-border-dark text-theme-text-white font-bold rounded text-sm transition border border-theme-border-light"
                            title="Export Selected Spawn">
                            📤 Export
                        </button>
                        <button onclick="document.getElementById('importHuntingFile').click()"
                            class="w-full p-2 bg-theme-bg-input hover:bg-theme-border-dark text-theme-text-white font-bold rounded text-sm transition border border-theme-border-light"
                            title="Import Single Spawn">
                            📥 Import
                        </button>
                        <input type="file" id="importHuntingFile" accept=".json" class="hidden"
                            onchange="importHuntingData(event)">
                    </div>
                </div>

                <hr class="border-theme-border-light mb-6">

                <div id="huntingSummary" class="space-y-4">
                </div>
            </div>

        </div>

        <div class="lg:w-2/3 space-y-6">
            <div id="creatureGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
            <hr class="border-theme-border-light mb-6">
            <div id="routeImageContainer"
                class="hidden bg-theme-bg-panel p-2 rounded-lg border border-theme-border-base shadow-lg">
                <img id="routeImage" src="" alt="Hunting Route"
                    class="w-full rounded border border-theme-border-light opacity-90 hover:opacity-100 transition">
            </div>
        </div>

    </div>
</div>

<div id="huntingEditorModal"
    class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
    <div
        class="bg-theme-bg-panel rounded-lg border border-theme-border-base shadow-2xl w-full max-w-4xl flex flex-col h-[90vh]">

        <div class="p-6 border-b border-theme-border-light flex justify-between items-center shrink-0">
            <div>
                <h2 id="modalTitle" class="text-xl font-bold text-theme-accent-text">Edit Hunting Ground</h2>
                <p class="text-xs text-theme-text-dim">Fill in the fields below. All lists should be comma-separated.
                </p>
            </div>
            <button onclick="closeEditor()" class="text-theme-text-dim hover:text-white transition">✕</button>
        </div>

        <div class="flex-grow overflow-y-auto p-6 space-y-8 custom-scrollbar">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-theme-text-muted uppercase">Unique ID</label>
                    <input id="edit_id" type="text"
                        class="w-full mt-1 p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:border-theme-accent-focus outline-none text-sm"
                        placeholder="e.g. asura_palace">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-theme-text-muted uppercase">Display Name</label>
                    <input id="edit_name" type="text"
                        class="w-full mt-1 p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:border-theme-accent-focus outline-none text-sm"
                        placeholder="e.g. Asura Palace">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-theme-text-muted uppercase">Route Image URL</label>
                    <input id="edit_route" type="text"
                        class="w-full mt-1 p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:border-theme-accent-focus outline-none text-sm"
                        placeholder="https://...">
                </div>
            </div>

            <div
                class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-theme-bg-input/20 p-4 rounded-lg border border-theme-border-light/50">
                <div>
                    <label class="text-[11px] font-bold text-theme-text-muted uppercase">Overall Damage Types</label>
                    <input id="edit_sum_damage" type="text"
                        class="w-full mt-1 p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:border-theme-accent-focus outline-none text-sm"
                        placeholder="Fire, Death, Physical">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-theme-text-muted uppercase">Overall Weaknesses</label>
                    <input id="edit_sum_weak" type="text"
                        class="w-full mt-1 p-2 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:border-theme-accent-focus outline-none text-sm"
                        placeholder="Ice, Holy">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-theme-text-white uppercase tracking-widest">Creatures & Charm
                        Strategy</h3>
                    <button onclick="addCreatureRow()"
                        class="px-3 py-1 bg-theme-accent-bg hover:bg-theme-accent-hover text-white rounded text-xs font-bold transition">+
                        Add Creature</button>
                </div>
                <div id="creatureFormList" class="space-y-4">
                </div>
            </div>
        </div>

        <div class="p-6 border-t border-theme-border-light flex gap-3 shrink-0">
            <button id="deleteBtn" onclick="deleteHuntingGround()"
                class="px-4 py-2 bg-red-900/40 hover:bg-red-800 text-white font-bold rounded text-sm transition mr-auto border border-red-800/50">🗑️
                Delete</button>
            <button onclick="closeEditor()"
                class="px-4 py-2 bg-theme-bg-input hover:bg-theme-border-dark text-theme-text-white font-bold rounded text-sm transition border border-theme-border-light">Cancel</button>
            <button onclick="saveEditor()"
                class="px-4 py-2 bg-theme-accent-bg hover:bg-theme-accent-hover text-theme-text-white font-bold rounded text-sm transition shadow">Save
                Document</button>
        </div>
    </div>
</div>
