<div id="page-alarms" class="flex flex-col md:flex-row gap-8">
    <div class="flex-1 bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col">
        <h2 class="text-xl font-semibold mb-4 text-green-400">Quick Alarms</h2>
        <div class="grid grid-cols-1 gap-3 flex-grow">
            <button onclick="triggerEndpoint('/alarms/potion')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                <img src="/static/images/Berserk_Potion.gif" alt="Berserk" class="w-8 h-8 pixel-art drop-shadow-md">
                <img src="/static/images/Bullseye_Potion.gif" alt="Bullseye" class="w-8 h-8 pixel-art drop-shadow-md">
                <span class="px-2">Start Skill Potion (10m)</span>
                <img src="/static/images/Mastermind_Potion.gif" alt="Mastermind" class="w-8 h-8 pixel-art drop-shadow-md">
                <img src="/static/images/Transcendence_Potion.gif" alt="Transcendence" class="w-8 h-8 pixel-art drop-shadow-md">
            </button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="triggerEndpoint('/alarms/plasma_ring')" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                    <img src="/static/images/Ring_of_Orange_Plasma.gif" alt="Plasma Ring" class="w-8 h-8 pixel-art drop-shadow-md">
                    <span>Plasma Ring (30m)</span>
                </button>
                <button onclick="triggerEndpoint('/alarms/plasma_amulet')" class="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                    <img src="/static/images/Collar_of_Orange_Plasma.gif" alt="Plasma Amulet" class="w-8 h-8 pixel-art drop-shadow-md">
                    <span>Plasma Amulet (30m)</span>
                </button>
            </div>
            <button onclick="triggerEndpoint('/alarms/prismatic_ring')" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                <img src="/static/images/Prismatic_Ring.gif" alt="Prismatic Ring" class="w-8 h-8 pixel-art drop-shadow-md">
                <span>Start Prismatic Ring (1h)</span>
            </button>
        </div>
    </div>

    <div class="flex-1 bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col">
        <h2 class="text-xl font-semibold mb-4 text-yellow-400">Custom Alarm</h2>
        <div class="space-y-3 flex-grow flex flex-col justify-center">
            <input type="text" id="alarmName" placeholder="Alarm Name" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-yellow-400">
            <input type="text" id="alarmDuration" placeholder="e.g. 1h 15m 30s or 90 minutes" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-yellow-400">
            <label class="flex items-center space-x-2 text-gray-300 mt-2 mb-2 cursor-pointer">
                <input type="checkbox" id="alarmRecurring" class="form-checkbox h-4 w-4 text-yellow-500 bg-gray-700 border-gray-600 rounded">
                <span class="select-none">Repeat continuously (Interval)</span>
            </label>
            <button onclick="setCustomAlarm()" class="w-full mt-auto bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded transition">
                ⏰ Set Custom Alarm
            </button>
        </div>
    </div>
</div>
