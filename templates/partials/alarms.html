<div id="page-alarms" class="flex flex-col md:flex-row gap-8 animate-fade-in">
    <div class="flex-1 bg-theme-bg-panel p-6 rounded-lg shadow-lg flex flex-col">
        <h2 class="text-xl font-semibold mb-4 text-theme-log-sys">Quick Alarms</h2>
        <div class="grid grid-cols-1 gap-3 flex-grow">
            <button onclick="triggerEndpoint('/alarms/potion')"
                class="w-full bg-theme-accent-bg hover:bg-theme-accent-hover text-theme-text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                <img src="/static/images/Berserk_Potion.gif" alt="Berserk" class="w-8 h-8 pixel-art drop-shadow-md">
                <img src="/static/images/Bullseye_Potion.gif" alt="Bullseye" class="w-8 h-8 pixel-art drop-shadow-md">
                <span class="px-2">Start Skill Potion (10m)</span>
                <img src="/static/images/Mastermind_Potion.gif" alt="Mastermind"
                    class="w-8 h-8 pixel-art drop-shadow-md">
                <img src="/static/images/Transcendence_Potion.gif" alt="Transcendence"
                    class="w-8 h-8 pixel-art drop-shadow-md">
            </button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="triggerEndpoint('/alarms/plasma_ring')"
                    class="w-full bg-theme-btn-plasma-ring-bg hover:bg-theme-btn-plasma-ring-hover text-theme-text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                    <img src="/static/images/Ring_of_Orange_Plasma.gif" alt="Plasma Ring"
                        class="w-8 h-8 pixel-art drop-shadow-md">
                    <span>Plasma Ring (30m)</span>
                </button>
                <button onclick="triggerEndpoint('/alarms/plasma_amulet')"
                    class="w-full bg-theme-btn-plasma-amulet-bg hover:bg-theme-btn-plasma-amulet-hover text-theme-text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                    <img src="/static/images/Collar_of_Orange_Plasma.gif" alt="Plasma Amulet"
                        class="w-8 h-8 pixel-art drop-shadow-md">
                    <span>Plasma Amulet (30m)</span>
                </button>
            </div>
            <button onclick="triggerEndpoint('/alarms/prismatic_ring')"
                class="w-full bg-theme-btn-prismatic-ring-bg hover:bg-theme-btn-prismatic-ring-hover text-theme-text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                <img src="/static/images/Prismatic_Ring.gif" alt="Prismatic Ring"
                    class="w-8 h-8 pixel-art drop-shadow-md">
                <span>Start Prismatic Ring (1h)</span>
            </button>
        </div>
    </div>

    <div class="flex-1 bg-theme-bg-panel p-6 rounded-lg shadow-lg flex flex-col">
        <h2 class="text-xl font-semibold mb-4 text-yellow-400">Custom Alarm</h2>
        <div class="space-y-3 flex-grow flex flex-col justify-center">
            <input type="text" id="alarmName" placeholder="Alarm Name"
                class="w-full p-2 bg-theme-bg-input rounded border border-theme-border-light focus:outline-none focus:border-yellow-400">
            <input type="text" id="alarmDuration" placeholder="e.g. 1h 15m 30s or 90 minutes"
                class="w-full p-2 bg-theme-bg-input rounded border border-theme-border-light focus:outline-none focus:border-yellow-400">
            <label class="flex items-center space-x-2 text-theme-text-muted mt-2 mb-2 cursor-pointer">
                <input type="checkbox" id="alarmRecurring"
                    class="form-checkbox h-4 w-4 text-yellow-500 bg-theme-bg-input border-theme-border-light rounded">
                <span class="select-none">Repeat continuously (Interval)</span>
            </label>
            <button onclick="setCustomAlarm()"
                class="w-full mt-auto bg-theme-btn-custom-alarm-bg hover:bg-theme-btn-custom-alarm-hover text-theme-text-white font-bold py-2 px-4 rounded transition">
                ⏰ Set Custom Alarm
            </button>
        </div>
    </div>
</div>
