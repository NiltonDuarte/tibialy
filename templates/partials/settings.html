<div id="page-settings" class="hidden animate-fade-in">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl">

        <div class="bg-theme-bg-panel p-6 rounded-lg border border-theme-border-base shadow-lg h-fit">
            <h2
                class="text-xl font-bold text-theme-accent-text mb-6 flex items-center gap-2 border-b border-theme-border-light pb-2">
                🎨 Appearance
            </h2>

            <div>
                <label class="text-xs font-semibold text-theme-text-muted block mb-2">Application Theme</label>
                <select id="themeSelector"
                    class="w-full p-2.5 bg-theme-bg-input rounded border border-theme-border-light text-theme-text-white focus:outline-none focus:border-theme-accent-focus cursor-pointer capitalize shadow-sm">
                </select>
                <p class="text-xs text-theme-text-dim mt-3">
                    Select your preferred color palette for the application interface.
                </p>
            </div>
        </div>

        <div class="bg-theme-bg-panel p-6 rounded-lg border border-theme-border-base shadow-lg h-fit">
            <h2
                class="text-xl font-bold text-theme-accent-text mb-6 flex items-center gap-2 border-b border-theme-border-light pb-2">
                🔊 Audio & Alerts
            </h2>

            <div>
                <div class="flex justify-between items-center mb-4">
                    <label class="text-xs font-semibold text-theme-text-muted">TTS Alarm Volume</label>
                    <span id="volumeLabel"
                        class="text-xs text-theme-accent-text font-mono font-bold bg-theme-bg-input px-2 py-1 rounded border border-theme-border-light shadow-sm">
                        100%
                    </span>
                </div>

                <input id="alarmVolume" type="range" min="0" max="100" value="100"
                    oninput="updateVolumeLabel(this.value)" onchange="saveVolumeSetting(this.value)"
                    class="w-full h-2 bg-theme-bg-input rounded-lg appearance-none cursor-pointer accent-theme-accent-text focus:outline-none focus:ring-1 focus:ring-theme-accent-focus">

                <p class="text-xs text-theme-text-dim mt-4">
                    Adjusts the playback volume of the text-to-speech voice engine used for notifications.
                </p>
            </div>
        </div>

    </div>
</div>
