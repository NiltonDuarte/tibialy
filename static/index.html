<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibialy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Forces the browser to keep pixel art crisp instead of blurring it */
        .pixel-art {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 font-sans p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-blue-400 border-b border-gray-700 pb-4">Tibialy Control Panel</h1>

        <div class="flex flex-col md:flex-row gap-8">

            <div class="flex-1 bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col">
                <h2 class="text-xl font-semibold mb-4 text-green-400">Quick Alarms</h2>

                <div class="grid grid-cols-1 gap-3 flex-grow">
                    <button onclick="triggerEndpoint('/alarms/potion')"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                        <img src="/static/images/Berserk_Potion.gif" alt="Berserk"
                            class="w-8 h-8 pixel-art drop-shadow-md">
                        <img src="/static/images/Bullseye_Potion.gif" alt="Bullseye"
                            class="w-8 h-8 pixel-art drop-shadow-md">
                        <span class="px-2">Start Skill Potion (10m)</span>
                        <img src="/static/images/Mastermind_Potion.gif" alt="Mastermind"
                            class="w-8 h-8 pixel-art drop-shadow-md">
                        <img src="/static/images/Transcendence_Potion.gif" alt="Transcendence"
                            class="w-8 h-8 pixel-art drop-shadow-md">
                    </button>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="triggerEndpoint('/alarms/plasma_ring')"
                            class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                            <img src="/static/images/Ring_of_Orange_Plasma.gif" alt="Plasma Ring"
                                class="w-8 h-8 pixel-art drop-shadow-md">
                            <span>Plasma Ring (30m)</span>
                        </button>

                        <button onclick="triggerEndpoint('/alarms/plasma_amulet')"
                            class="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                            <img src="/static/images/Collar_of_Orange_Plasma.gif" alt="Plasma Amulet"
                                class="w-8 h-8 pixel-art drop-shadow-md">
                            <span>Plasma Amulet (30m)</span>
                        </button>
                    </div>

                    <button onclick="triggerEndpoint('/alarms/prismatic_ring')"
                        class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center space-x-2">
                        <img src="/static/images/Prismatic_Ring.gif" alt="Prismatic Ring"
                            class="w-8 h-8 pixel-art drop-shadow-md">
                        <span>Start Prismatic Ring (1h)</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col">
                <h2 class="text-xl font-semibold mb-4 text-yellow-400">Custom Alarm</h2>
                <div class="space-y-3 flex-grow flex flex-col justify-center">
                    <input type="text" id="alarmName" placeholder="Alarm Name"
                        class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-yellow-400">
                    <input type="text" id="alarmDuration" placeholder="e.g. 1h 15m 30s or 90 minutes"
                        class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-yellow-400">

                    <label class="flex items-center space-x-2 text-gray-300 mt-2 mb-2 cursor-pointer">
                        <input type="checkbox" id="alarmRecurring"
                            class="form-checkbox h-4 w-4 text-yellow-500 bg-gray-700 border-gray-600 rounded">
                        <span class="select-none">Repeat continuously (Interval)</span>
                    </label>

                    <button onclick="setCustomAlarm()"
                        class="w-full mt-auto bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded transition">
                        ⏰ Set Custom Alarm
                    </button>
                </div>
            </div>

        </div>
        <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4 text-indigo-400">Discord Automation</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="discordMsg" placeholder="Message to send"
                    class="col-span-2 p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-indigo-400">
                <input type="datetime-local" id="discordTime" step="0.001"
                    class="p-2 bg-gray-700 rounded border border-gray-600 text-gray-200 focus:outline-none focus:border-indigo-400">
            </div>
            <button onclick="scheduleDiscord()"
                class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded transition">
                💬 Schedule Message
            </button>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4 text-cyan-400">Active Timers</h2>
            <div id="timersContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="text-gray-500 col-span-full">No active timers.</p>
            </div>
        </div>

    </div>
    <div class="mt-8 w-full bg-black p-4 rounded-lg border border-gray-700 h-64 overflow-y-auto font-mono text-sm">
        <h3 class="text-gray-400 mb-2 border-b border-gray-800 pb-1">Activity Log</h3>
        <ul id="logWindow" class="space-y-1 text-green-300"></ul>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
